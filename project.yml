name: Zynic
options:
  bundleIdPrefix: com.zynic
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  defaultConfig: Release

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  Zynic:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Zynic
        excludes:
          - "Preview Content/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zynic.app
        PRODUCT_NAME: Zynic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: Zynic/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    preBuildScripts: []
    info:
      path: Zynic/Info.plist
      properties:
        CFBundleDisplayName: Zynic
        CFBundleName: Zynic
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Dark
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSMicrophoneUsageDescription: "Used for voice search"
        NSAppleMusicUsageDescription: "Access your music library"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
